name: CI und Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test-build:
    name: Test und Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2

      - name: Composer validieren
        run: composer validate --strict

      - name: Abhängigkeiten installieren
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Coding Standards prüfen
        run: composer lint

      - name: Tests ausführen
        run: composer test

      - name: Release-Build erstellen
        run: composer build

      - name: Build entpacken für Plugin Check
        run: |
          ZIP_FILE="$(ls dist/*.zip | head -n 1)"
          unzip -q "$ZIP_FILE" -d plugin-build
          echo "PLUGIN_BUILD_DIR=$(find plugin-build -mindepth 1 -maxdepth 1 -type d | head -n 1)" >> "$GITHUB_ENV"

      - name: Plugin Check (Plugin Repo)
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ${{ env.PLUGIN_BUILD_DIR }}
          slug: ai-provider-for-open-webui
          wp-version: trunk
          categories: plugin_repo

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: test-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: dist

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

  deploy-wordpress-org:
    name: Deploy zu WordPress.org (SVN)
    needs:
      - test-build
      - release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versionen gegen Tag prüfen
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_FILE="ai-provider-for-open-webui.php"
          README_FILE="readme.txt"

          if [[ ! -f "$PLUGIN_FILE" ]]; then
            echo "Fehler: Plugin-Datei nicht gefunden: $PLUGIN_FILE"
            exit 1
          fi

          if [[ ! -f "$README_FILE" ]]; then
            echo "Fehler: readme.txt nicht gefunden"
            exit 1
          fi

          HEADER_VERSION="$(awk -F': *' 'BEGIN{IGNORECASE=1} /^Version:/ {print $2; exit}' "$PLUGIN_FILE" | tr -d '\r')"
          README_STABLE_TAG="$(awk -F': *' 'BEGIN{IGNORECASE=1} /^Stable tag:/ {print $2; exit}' "$README_FILE" | tr -d '\r')"

          if [[ -z "$HEADER_VERSION" ]]; then
            echo "Fehler: Keine Version im Plugin-Header gefunden."
            exit 1
          fi

          if [[ -z "$README_STABLE_TAG" ]]; then
            echo "Fehler: Kein Stable tag in readme.txt gefunden."
            exit 1
          fi

          echo "Tag-Version:        $TAG_VERSION"
          echo "Plugin-Header:      $HEADER_VERSION"
          echo "readme Stable tag:  $README_STABLE_TAG"

          if [[ "$HEADER_VERSION" != "$TAG_VERSION" ]]; then
            echo "Fehler: Plugin-Header-Version passt nicht zum Tag."
            exit 1
          fi

          if [[ "$README_STABLE_TAG" != "$TAG_VERSION" ]]; then
            echo "Fehler: readme Stable tag passt nicht zum Tag."
            exit 1
          fi

      - name: Deploy nach WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          slug: ai-provider-for-open-webui
        env:
          SVN_USERNAME: ${{ secrets.SVN_USER }}
          SVN_PASSWORD: ${{ secrets.SVN_PASS }}
